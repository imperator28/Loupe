name: Native verification

on:
  push:
    # Documentation-only pushes must not preempt an in-flight (potentially
    # hours-long, cold-cache) dependency bootstrap via the concurrency group.
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: native-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # A cold vcpkg bootstrap builds Qt 6 and OpenCASCADE from source. With the
    # release-only triplets this is roughly halved versus the default
    # debug+release double build, but the first uncached run still needs a
    # large budget; warm runs finish in minutes.
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon release
            os: macos-14
            configure_preset: macos-arm64-release
            vcpkg_triplet: arm64-osx-release
            vcpkg_cache_path: ~/.cache/vcpkg/archives
            vcpkg_install_options: --clean-buildtrees-after-build;--clean-packages-after-build
          - name: Windows 11 x64 release
            os: windows-2025
            configure_preset: windows-release
            vcpkg_triplet: x64-windows-release
            vcpkg_cache_path: ~\AppData\Local\vcpkg\archives
            # Short buildtrees root: qtdeclarative's fluentwinui3 plugin object
            # path reaches 263 characters under the default workspace-relative
            # buildtrees dir — 3 over Windows' MAX_PATH — and MSVC fails with
            # C1083. A 5-character root reclaims ~29 characters of headroom.
            vcpkg_install_options: --clean-buildtrees-after-build;--clean-packages-after-build;--x-buildtrees-root=D:/bt
    env:
      LOUPE_VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_COMMIT: db4723bd0a99eab031f1a3dee4336dca43049c87
      VCPKG_DISABLE_METRICS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Enable the MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install macOS vcpkg prerequisites
        if: runner.os == 'macOS'
        shell: bash
        run: brew install autoconf autoconf-archive automake libtool

      - name: Install vcpkg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$LOUPE_VCPKG_ROOT"
          git -C "$LOUPE_VCPKG_ROOT" checkout --detach "$VCPKG_COMMIT"
          "$LOUPE_VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:LOUPE_VCPKG_ROOT"
          git -C "$env:LOUPE_VCPKG_ROOT" checkout --detach "$env:VCPKG_COMMIT"
          & "$env:LOUPE_VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Set vcpkg root (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "VCPKG_ROOT=$LOUPE_VCPKG_ROOT" >> "$GITHUB_ENV"

      - name: Set vcpkg root (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:LOUPE_VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # vcpkg writes one binary archive per built port, so restoring even a
      # partial cache lets an interrupted dependency build resume where it
      # stopped instead of starting over.
      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ matrix.vcpkg_cache_path }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Configure
        # Leave the job enough headroom after a cancelled configure for the
        # cache-save step below to bank whatever ports finished building.
        timeout-minutes: 330
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            test "$(uname -m)" = arm64
          fi
          # VCPKG_HOST_TRIPLET must match: Qt ports pull their host tools
          # (moc, rcc, qmlcachegen) through the *host* triplet, which would
          # otherwise silently build a second, debug+release dependency world
          # alongside the release-only target one. The clean options bound
          # peak runner disk by deleting each port's buildtree once its
          # binary archive exists — the macOS runner died of disk exhaustion
          # without them.
          cmake --preset "${{ matrix.configure_preset }}" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.vcpkg_triplet }}" \
            -DVCPKG_HOST_TRIPLET="${{ matrix.vcpkg_triplet }}" \
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/triplets" \
            -DVCPKG_INSTALL_OPTIONS="${{ matrix.vcpkg_install_options }}"

      # Unique key per run plus if: always() means every run — including one
      # whose configure timed out halfway through Qt — saves its progress for
      # the next attempt to resume from.
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ matrix.vcpkg_cache_path }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/**') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build
        shell: bash
        run: cmake --build --preset "${{ matrix.configure_preset }}" --parallel

      - name: Test
        shell: bash
        run: ctest --preset "${{ matrix.configure_preset }}" --output-on-failure

      - name: Package release app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --keepParent \
            "build/${{ matrix.configure_preset }}/src/app/Loupe.app" \
            loupe-macos-arm64.zip

      - name: Upload release app (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: loupe-macos-arm64
          path: loupe-macos-arm64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload release app (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: loupe-windows-x64
          path: build/${{ matrix.configure_preset }}/src/app/
          if-no-files-found: error
          retention-days: 14
