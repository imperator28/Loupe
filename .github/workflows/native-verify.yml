name: Native verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon release
            os: macos-14
            configure_preset: macos-arm64-release
          - name: Windows 11 x64 release
            os: windows-2025
            configure_preset: windows-release
    env:
      LOUPE_VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_COMMIT: db4723bd0a99eab031f1a3dee4336dca43049c87
      VCPKG_DISABLE_METRICS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Enable the MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install macOS vcpkg prerequisites
        if: runner.os == 'macOS'
        shell: bash
        run: brew install autoconf autoconf-archive automake libtool

      - name: Install vcpkg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$LOUPE_VCPKG_ROOT"
          git -C "$LOUPE_VCPKG_ROOT" checkout --detach "$VCPKG_COMMIT"
          "$LOUPE_VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:LOUPE_VCPKG_ROOT"
          git -C "$env:LOUPE_VCPKG_ROOT" checkout --detach "$env:VCPKG_COMMIT"
          & "$env:LOUPE_VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Set vcpkg root (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "VCPKG_ROOT=$LOUPE_VCPKG_ROOT" >> "$GITHUB_ENV"

      - name: Set vcpkg root (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:LOUPE_VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            test "$(uname -m)" = arm64
          fi
          cmake --preset "${{ matrix.configure_preset }}"

      - name: Build
        shell: bash
        run: cmake --build --preset "${{ matrix.configure_preset }}" --parallel

      - name: Test
        shell: bash
        run: ctest --preset "${{ matrix.configure_preset }}" --output-on-failure
