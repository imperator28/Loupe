name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon release
            os: macos-14
            configure_preset: macos-arm64-release
            vcpkg_triplet: arm64-osx-release
            vcpkg_cache_path: ~/.cache/vcpkg/archives
            vcpkg_install_options: --clean-buildtrees-after-build;--clean-packages-after-build
          - name: Windows 11 x64 release
            os: windows-2025
            configure_preset: windows-release
            vcpkg_triplet: x64-windows-release
            vcpkg_cache_path: ~\AppData\Local\vcpkg\archives
            # Short buildtrees root keeps Qt object paths under Windows'
            # MAX_PATH; see native-verify.yml for the measured rationale.
            vcpkg_install_options: --clean-buildtrees-after-build;--clean-packages-after-build;--x-buildtrees-root=D:/bt
    env:
      LOUPE_VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_COMMIT: db4723bd0a99eab031f1a3dee4336dca43049c87
      VCPKG_DISABLE_METRICS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Enable the MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install macOS vcpkg prerequisites
        if: runner.os == 'macOS'
        shell: bash
        run: brew install autoconf autoconf-archive automake libtool

      - name: Install vcpkg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$LOUPE_VCPKG_ROOT"
          git -C "$LOUPE_VCPKG_ROOT" checkout --detach "$VCPKG_COMMIT"
          "$LOUPE_VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:LOUPE_VCPKG_ROOT"
          git -C "$env:LOUPE_VCPKG_ROOT" checkout --detach "$env:VCPKG_COMMIT"
          & "$env:LOUPE_VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Set vcpkg root (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "VCPKG_ROOT=$LOUPE_VCPKG_ROOT" >> "$GITHUB_ENV"

      - name: Set vcpkg root (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:LOUPE_VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ matrix.vcpkg_cache_path }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Configure
        timeout-minutes: 330
        shell: bash
        run: |
          # Host triplet must match the target so Qt host tools do not build
          # a second dependency world; clean options bound peak runner disk.
          # See native-verify.yml for the full rationale.
          cmake --preset "${{ matrix.configure_preset }}" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.vcpkg_triplet }}" \
            -DVCPKG_HOST_TRIPLET="${{ matrix.vcpkg_triplet }}" \
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/triplets" \
            -DVCPKG_INSTALL_OPTIONS="${{ matrix.vcpkg_install_options }}"

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ matrix.vcpkg_cache_path }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/**') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build
        shell: bash
        run: cmake --build --preset "${{ matrix.configure_preset }}" --parallel

      - name: Test
        shell: bash
        run: |
          ctest --preset "${{ matrix.configure_preset }}" --output-on-failure --timeout 600 || {
            ctest --preset "${{ matrix.configure_preset }}" --rerun-failed --extra-verbose --timeout 600
            exit 1
          }

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          STAGE=dist/loupe-macos-arm64
          mkdir -p "$STAGE"
          cp -R "build/${{ matrix.configure_preset }}/src/app/Loupe.app" "$STAGE/"
          cp "scripts/macos/Open Loupe (first run).command" "$STAGE/"
          test -f "$STAGE/Loupe.app/Contents/MacOS/loupe-worker"
          ditto -c -k --keepParent "$STAGE" "loupe-${{ github.ref_name }}-macos-arm64.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # See native-verify.yml for the staging rationale.
        run: |
          EXE=$(find "build/${{ matrix.configure_preset }}" -maxdepth 3 \( -name Loupe.exe -o -name loupe-app.exe \) -not -path "*CMakeFiles*" | head -1)
          test -n "$EXE"
          mkdir -p dist/loupe-windows-x64
          cp "$EXE" dist/loupe-windows-x64/Loupe.exe
          cp "$(dirname "$EXE")"/*.dll dist/loupe-windows-x64/ 2>/dev/null || true
          # The app launches loupe-worker.exe as a subprocess for all STEP
          # import/geometry work; it sits beside the main exe in the build
          # output but the *.dll glob above never picks it up, so every
          # release before this fix shipped without it.
          cp "$(dirname "$EXE")/loupe-worker.exe" dist/loupe-windows-x64/
          VCPKG_INSTALLED="build/${{ matrix.configure_preset }}/vcpkg_installed/${{ matrix.vcpkg_triplet }}"
          WINDEPLOY=$(find "$VCPKG_INSTALLED/tools" -name windeployqt.exe 2>/dev/null | head -1)
          if [[ -n "$WINDEPLOY" ]]; then
            "$WINDEPLOY" --release --qmldir src/app/qml dist/loupe-windows-x64/Loupe.exe
          else
            echo "windeployqt not found; staging Qt runtime wholesale"
            cp -r "$VCPKG_INSTALLED/Qt6/plugins" dist/loupe-windows-x64/
            cp -r "$VCPKG_INSTALLED/Qt6/qml" dist/loupe-windows-x64/
            cp "$VCPKG_INSTALLED/bin"/*.dll dist/loupe-windows-x64/
            # Qt only auto-discovers a "platforms" folder that is a direct
            # sibling of the exe; staged wholesale it is one level deeper, at
            # ./plugins/platforms, so without this qt.conf every packaged exe
            # fails at launch with "Could not find the Qt platform plugin
            # windows in ''" -- confirmed by inspecting the v0.1.0 asset itself.
            printf '[Paths]\nPrefix = .\nPlugins = plugins\nQml2Imports = qml\n' > dist/loupe-windows-x64/qt.conf
          fi
          cd dist && 7z a "../loupe-${{ github.ref_name }}-windows-x64.zip" loupe-windows-x64

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.vcpkg_triplet }}
          path: loupe-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    # Only tags publish a release; manual dispatch runs stop at artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Loupe ${{ github.ref_name }}" \
            --generate-notes \
            loupe-*.zip
